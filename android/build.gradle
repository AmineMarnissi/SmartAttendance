buildscript {
    ext {
        buildToolsVersion = "36.1.0"
        minSdkVersion = 26
        compileSdkVersion = 36
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

subprojects { subproject ->
    configurations.configureEach {
        resolutionStrategy.force "androidx.camera:camera-core:1.5.0-alpha03"
        resolutionStrategy.force "androidx.camera:camera-camera2:1.5.0-alpha03"
        resolutionStrategy.force "androidx.camera:camera-lifecycle:1.5.0-alpha03"
        resolutionStrategy.force "androidx.camera:camera-video:1.5.0-alpha03"
        resolutionStrategy.force "androidx.camera:camera-view:1.5.0-alpha03"
        resolutionStrategy.force "androidx.camera:camera-extensions:1.5.0-alpha03"
        resolutionStrategy.force "androidx.core:core:1.13.1"
        resolutionStrategy.force "androidx.core:core-ktx:1.13.1"
        resolutionStrategy.force "androidx.transition:transition:1.5.1"
        resolutionStrategy.force "androidx.transition:transition-ktx:1.5.1"
        resolutionStrategy.force "androidx.media3:media3-common:1.3.1"
        resolutionStrategy.force "androidx.media3:media3-container:1.3.1"
        resolutionStrategy.force "androidx.media3:media3-muxer:1.3.1"
    }
}

apply plugin: "com.facebook.react.rootproject"


